{% extends "base.html" %}
{% block content %}

<div class="flex items-center justify-center mt-[60px] flex-col">

    <h1 class="text-[#A5BBDC] text-[27px] mb-4">Ro‘yxatdan o‘tish</h1>

    <form method="post" class="w-[380px]">
        {% csrf_token %}

        <div class="flex mt-2">
            <i
                class="w-[40px] pt-[11px] p-[2px] border-white border-r-[1px] text-white h-[42px] bg-green-600 fa-solid fa-envelope flex items-center justify-center text-[#6E879F] rounded-l-lg"></i>
            <input
                class="w-full p-2 text-[13px] outline-none h-[42px] bg-green-600 text-white rounded-r-lg focus:ring-2 focus:ring-purple-500"
                type="email" placeholder="Email" required name="email">
        </div>
       
        <div class="flex mt-3">
            <i
                class="w-[40px] pt-[11px]  border-white border-r-[1px] text-white h-[42px] bg-green-600 fa-solid fa-user flex items-center justify-center text-[#6E879F] rounded-l-lg"></i>
            <input
                class="w-full p-2 text-[13px] outline-none h-[42px] bg-green-600 text-white rounded-r-lg focus:ring-2 focus:ring-purple-500"
                type="text" placeholder="Username" name="username" required>
        </div>

        <div class="flex mt-3">
            <i
                class="w-[40px] pt-[11px]  border-white border-r-[1px] text-white h-[42px] bg-green-600 fa-solid fa-key flex items-center justify-center text-[#6E879F] rounded-l-lg"></i>
            <input
                class="w-full p-2 text-[13px] outline-none h-[42px] bg-green-600 text-white rounded-r-lg focus:ring-2 focus:ring-purple-500"
                type="password" placeholder="Parol" name="password" required>
        </div>

        <div class="flex mt-3">
            <i
                class="w-[40px] pt-[11px]  border-white border-r-[1px] text-white h-[42px] bg-green-600 fa-solid fa-lock flex items-center justify-center text-[#6E879F] rounded-l-lg"></i>
            <input
                class="w-full p-2 text-[13px] outline-none h-[42px] bg-green-600 text-white rounded-r-lg focus:ring-2 focus:ring-purple-500"
                type="password" placeholder="Parolni tasdiqlang" name="password2" required>
        </div>

        <div class="flex items-center mt-4 gap-2">
            <input type="checkbox" required>
            <span class="text-[#6e879f] text-[12px]">Foydalanish shartlariga roziman</span>
        </div>

        <button type="submit"
            class="w-full h-[42px] text-white mt-4 text-[15px] bg-green-600 rounded-lg hover:bg-purple-700 transition">
            Davom etish
        </button>

    </form>

    <div class="mt-3 flex gap-2 text-[12px]">
        <span class="text-[#6e879f]">Allaqachon akkauntingiz bormi?</span>
        <a href="#" class="text-purple-500 hover:underline">Kirish</a>
    </div>

    <div class="w-[380px] flex items-center justify-between mt-4">
        <hr class="w-[150px] border-gray-500">
        <span class="text-[12px] text-gray-400">YOKI</span>
        <hr class="w-[150px] border-gray-500">
    </div>


    <div class="w-[380px] flex gap-2 mt-3">
        <button
            class="w-1/2 h-[40px] bg-[#4285f4] rounded-lg text-white flex items-center justify-center gap-2 hover:opacity-90">
            <i class="fa-brands fa-google"></i> Google
        </button>

        <button
            class="w-1/2 h-[40px] bg-[#229ED9] rounded-lg text-white flex items-center justify-center gap-2 hover:opacity-90">
            <i class="fa-brands fa-telegram"></i> Telegram
        </button>
    </div>

</div>

{% endblock %}
